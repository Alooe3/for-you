<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Особое приглашение</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0d0d0d;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow: hidden;
        }
        .container {
            max-width: 500px;
            width: 100%;
            text-align: center;
            opacity: 0;
            animation: fadeIn 1.5s ease-in-out forwards;
        }
        .subtitle {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #8c8c8c;
            margin-bottom: 25px;
        }
        .heading {
            font-size: 26px;
            font-weight: 300;
            line-height: 1.6;
            margin-bottom: 40px;
            letter-spacing: 0.5px;
        }
        .highlight {
            color: #d4af37;
            font-weight: 400;
        }
        .irony {
            font-size: 15px;
            color: #a6a6a6;
            font-style: italic;
            margin-top: 15px;
            display: block;
        }
        .btn {
            background: none;
            border: 1px solid #ffffff;
            color: #ffffff;
            padding: 14px 40px;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 0;
            transition: all 0.4s ease;
            margin-top: 20px;
            width: auto;
        }
        .btn:hover {
            background-color: #ffffff;
            color: #0d0d0d;
        }
        .hidden {
            display: none !important;
        }
        .success-screen h2 {
            font-size: 30px;
            font-weight: 300;
            color: #d4af37;
            margin-bottom: 20px;
        }
        .success-screen p {
            color: #a6a6a6;
            font-size: 16px;
            line-height: 1.6;
        }
        /* Анимация галочки */
        .checkmark-wrapper {
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
        }
        .checkmark {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: block;
            stroke-width: 2;
            stroke: #d4af37;
            stroke-miterlimit: 10;
            box-shadow: inset 0px 0px 0px #d4af37;
            animation: fill .4s ease-in-out .4s forwards, scale .3s ease-in-out .9s forwards;
        }
        .checkmark__circle {
            stroke-dasharray: 166;
            stroke-dashoffset: 166;
            stroke-width: 2;
            stroke-miterlimit: 10;
            stroke: #d4af37;
            fill: none;
            animation: stroke 0.6s cubic-bezier(0.65, 0, 0.45, 1) forwards;
        }
        .checkmark__check {
            transform-origin: 50% 50%;
            stroke-dasharray: 48;
            stroke-dashoffset: 48;
            animation: stroke 0.3s cubic-bezier(0.65, 0, 0.45, 1) 0.6s forwards;
        }
        @keyframes stroke {
            100% { stroke-dashoffset: 0; }
        }
        @keyframes scale {
            0%, 100% { transform: none; }
            50% { transform: scale3d(1.1, 1.1, 1); }
        }
        @keyframes fill {
            100% { box-shadow: inset 0px 0px 0px 30px transparent; }
        }
        @keyframes fadeIn {
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <!-- Экран 1: Приглашение -->
    <div class="container" id="step1">
        <p class="subtitle">Personal Invitation</p>
        <h1 class="heading">
            Любимая моя, <span class="highlight">Ангелина Николаевна</span>,<br>
            я знаю, как давно ты ждала этого момента, и вот он настал.<br><br>
            Приглашаю тебя на красивый ужин.<br>
            <span class="irony">И вроде с красивым мужчиной...</span>
        </h1>
        <button class="btn" onclick="acceptInvitation()">Принять</button>
    </div>

    <!-- Экран 2: Финал с красивой галочкой -->
    <div class="container hidden success-screen" id="step2">
        <div class="checkmark-wrapper">
            <svg class="checkmark" xmlns="http://w3.org" viewBox="0 0 52 52">
                <circle class="checkmark__circle" cx="26" cy="26" r="25" fill="none"/>
                <path class="checkmark__check" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
            </svg>
        </div>
        <h2>Прекрасный выбор.</h2>
        <p>Приглашение официально принято.<br>До встречи в назначенное время. Готовь лучший наряд.</p>
    </div>

    <script>
        function acceptInvitation() {
            const step1 = document.getElementById('step1');
            const step2 = document.getElementById('step2');
            
            step1.classList.add('hidden');
            step2.classList.remove('hidden');
        }
    </script>
</body>
</html>
